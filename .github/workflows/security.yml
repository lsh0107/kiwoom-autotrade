name: Security Scanning

# ── 트리거 전략 ──────────────────────────────────
# PR: 빠른 피드백 (시크릿 + 의존성) → 머지 차단용
# push(main/dev): 심층 분석 (CodeQL + Bandit SARIF) → 보안 대시보드 업데이트
# schedule: 주간 전체 스캔
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 9 * * 1'  # 매주 월요일 09:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PR 체크 (빠른 피드백, 머지 차단용)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # 시크릿 탐지 (~10초)
  gitleaks:
    name: Secret Detection
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 시크릿 심층 스캔 (~10초)
  trufflehog:
    name: TruffleHog Deep Scan
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # 의존성 취약점 (~40초)
  dependency-scan:
    name: Dependency Audit
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: snok/install-poetry@v1
      - run: |
          pip install pip-audit
          poetry install --no-interaction --no-root
          pip-audit --strict --vulnerability-service osv

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 머지 후 심층 분석 (보안 대시보드 업데이트용)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # Bandit SARIF → GitHub Security 탭 (~2분)
  bandit:
    name: Python SAST
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install bandit[sarif]
      - run: |
          if [ -d src/ ]; then
            bandit -r src/ \
              -x ./tests \
              -ll -ii \
              -f sarif \
              -o bandit-results.sarif || true
          else
            echo '{"runs":[]}' > bandit-results.sarif
          fi
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # CodeQL 심층 SAST → GitHub Security 탭 (~3분)
  codeql:
    name: CodeQL Analysis
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
        with:
          category: codeql-python
