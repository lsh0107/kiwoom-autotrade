# 보안 + 코드 품질 Pre-commit Hooks
# 설치: pip install pre-commit && pre-commit install
# 전체 스캔: pre-commit run --all-files

repos:
  # ── 기본 검사 ──────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: debug-statements            # pdb/breakpoint() 감지
      - id: detect-private-key           # 개인키 파일 감지
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch          # main/dev 직접 커밋 방지
        args: ['--branch', 'main', '--branch', 'dev']

  # ── 시크릿 감지 (gitleaks) ─────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── Python 보안 분석 (bandit) ──────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: '1.9.0'
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        exclude: ^tests/

  # ── 의존성 취약점 (pip-audit) ──────────────────
  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: ['--strict']
        stages: [pre-push]              # push 시에만 (느림)

  # ── Python 린터/포매터 (ruff) ──────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format
