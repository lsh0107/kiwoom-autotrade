# 로컬 개발 환경 오버라이드
# - backend: DATABASE_URL을 docker 네트워크 서비스명(postgres)으로 교체
# - backend: 스크리닝 결과(docs/backtest-results/)를 호스트와 공유하여 캐시 재사용 가능하게 마운트
# - airflow: KIWOOM_DATA_DIR + data 볼륨은 base docker-compose.yml의 x-airflow-common anchor에 통합
services:
  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kiwoom}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-kiwoom_trade}
      # http://localhost 환경에서 브라우저가 쿠키 저장하도록 Secure 플래그 비활성화
      DEBUG: "true"
      # LLM 자동 승인 + approved 결정 라이브 매매 반영 활성화 (Phase 1)
      USE_LLM_DECISIONS: "true"
    volumes:
      - ./docs:/app/docs
      - ./src:/app/src:ro
