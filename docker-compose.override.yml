# 로컬 개발 환경 오버라이드
# - backend: DATABASE_URL을 docker 네트워크 서비스명(postgres)으로 교체
# - backend: 스크리닝 결과(docs/backtest-results/)를 호스트와 공유하여 캐시 재사용 가능하게 마운트
# - airflow: DATA_DIR 경로 통일 (/opt/airflow/data) + 호스트 data/ 공유로 save_json 저장 가능
services:
  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kiwoom}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-kiwoom_trade}
    volumes:
      - ./docs:/app/docs
      - ./src:/app/src:ro

  airflow-scheduler:
    environment:
      KIWOOM_DATA_DIR: /opt/airflow/data
    volumes:
      - ./data:/opt/airflow/data

  airflow-triggerer:
    environment:
      KIWOOM_DATA_DIR: /opt/airflow/data
    volumes:
      - ./data:/opt/airflow/data

  airflow-dag-processor:
    environment:
      KIWOOM_DATA_DIR: /opt/airflow/data
    volumes:
      - ./data:/opt/airflow/data

  airflow-webserver:
    environment:
      KIWOOM_DATA_DIR: /opt/airflow/data
    volumes:
      - ./data:/opt/airflow/data
